<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <!-- Ctask2.js stores this feedback in a cookie for 10 seconds. -->
    <h1>Feedback Form</h1>
    <form action="/feedback" method="post">
        <label>
            Name:
            <input type="text" name="name" required>
        </label>
        <br><br>
        <label>
            Email:
            <input type="email" name="email" required>
        </label>
        <br><br>
        <label>
            Message:
            <textarea name="message" rows="4" cols="40" required></textarea>
        </label>
        <br><br>
        <p>Rating:</p>
        <label><input type="radio" name="rating" value="Bad" required> Bad</label>
        <label><input type="radio" name="rating" value="Average"> Average</label>
        <label><input type="radio" name="rating" value="Good"> Good</label>
        <label><input type="radio" name="rating" value="Very Good"> Very Good</label>
        <label><input type="radio" name="rating" value="Excellent"> Excellent</label>
        <br><br>
        <button type="submit">Submit Feedback</button>
    </form>
</body>
</html>
