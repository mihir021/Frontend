<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON - stringify()</title>
    <script>
        /*
         * Topic: JSON.stringify()
         *
         * JSON.stringify() converts a JavaScript object into a JSON string.
         *
         * Common uses:
         *   - Storing data in localStorage
         *   - Sending data to a server/API
         *
         * Open the browser console (F12 -> Console) to see the output.
         */

        // Converting a JS object to a JSON string using JSON.stringify()
        let obj = JSON.stringify(
            {
                var1 : "LJ",
                var2 : "uni"
            })

        // Output will be a string: '{"var1":"LJ","var2":"uni"}'
        console.log(obj)
    </script>
</head>
<body>

</body>
</html>
